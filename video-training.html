<title>教育訓練影片學習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1814;--ink2:#3d3a34;--ink3:#7a7570;
  --paper:#faf9f6;--paper2:#f2f0eb;--paper3:#e8e5de;
  --accent:#F47920;--accent2:#D45F0A;--accent-light:#FEF5EC;
  --green:#1a7a3a;--green-light:#e8f5ed;
  --orange:#F47920;--orange-light:#FEF5EC;
  --danger:#F47920;--danger-light:#FEF5EC;
  --red:#8b2020;--red-light:#fde8e8;
  --purple:#5a3a9a;--purple-light:#f0ebfa;
  --navy:#1a3a6a;
  --radius:4px;--radius-lg:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* COVER */
#screen-cover{background:var(--paper);align-items:center;justify-content:center;text-align:center;padding:2rem}
#screen-cover .logo-wrap{margin-bottom:2rem;padding-bottom:1.75rem;border-bottom:1px solid var(--paper3)}
#screen-cover .logo-wrap img{height:auto;max-height:88px;max-width:265px;width:auto}
#screen-cover .new-law-badge{background:var(--accent-light);color:var(--accent2);border:1px solid rgba(244,121,32,.3);border-radius:20px;padding:.35rem 1.2rem;font-size:.82rem;font-weight:700;letter-spacing:.08em;display:inline-block;margin-bottom:1.25rem}
#screen-cover h1{font-size:2rem;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:.6rem}
#screen-cover h2{font-size:.95rem;font-weight:400;color:var(--ink2);margin-bottom:2.25rem;line-height:1.6}
#screen-cover .meta{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.75rem}
#screen-cover .meta span{background:var(--paper2);color:var(--ink2);border-radius:20px;padding:.35rem 1rem;font-size:.82rem;border:1px solid var(--paper3)}
#screen-cover .btn-start{background:var(--accent);color:#fff;font-size:.95rem;font-weight:700;padding:.9rem 2.75rem;border-radius:30px;border:none;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s}
#screen-cover .btn-start:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(244,121,32,.35)}

/* BUTTONS */
.btn{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-size:.88rem;font-weight:500;padding:.55rem 1.4rem;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:transparent;color:var(--ink2);border:1px solid var(--paper3)}
.btn-secondary:hover{background:var(--paper)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#14602e}
.btn:disabled{opacity:.4;cursor:not-allowed}

.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.8rem;font-weight:700;color:var(--ink2);margin-bottom:.35rem}
.form-group input,.form-group select{width:100%;padding:.62rem .9rem;border:1px solid var(--paper3);border-radius:var(--radius);font-family:inherit;font-size:.88rem;color:var(--ink);background:var(--paper);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(244,121,32,.15)}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;background:var(--paper)}
.login-card{background:#fff;border-radius:12px;border:1px solid var(--paper3);padding:2.25rem;width:100%;max-width:460px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.login-card h2{font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:.35rem}
.login-card>p{font-size:.85rem;color:var(--ink3);margin-bottom:1.75rem}
.login-id-row{display:flex;gap:.6rem}
.login-id-row input{flex:1}
.login-id-row button{white-space:nowrap}
#login-progress-area{margin-top:1.25rem}
.progress-badge{border-radius:var(--radius-lg);padding:.85rem 1.1rem;font-size:.85rem;font-weight:500;display:flex;align-items:flex-start;gap:.65rem;margin-bottom:1rem}
.progress-badge .pb-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.progress-badge .pb-text{line-height:1.6}
.progress-badge .pb-label{font-weight:700;display:block;font-size:.8rem;letter-spacing:.04em;margin-bottom:.2rem}
.progress-badge.none{background:#f5f5f4;border:1px solid #e0ddd6;color:var(--ink2)}
.progress-badge.in_progress{background:#fff8e6;border:1px solid #f0d870;color:#7a5f00}
.progress-badge.done{background:var(--green-light);border:1px solid #b7eb8f;color:#135200}
.manual-fields{border-top:1px solid var(--paper3);padding-top:1rem;margin-top:.25rem}
.manual-fields .mf-hint{font-size:.78rem;color:var(--ink3);margin-bottom:.85rem}

/* VIDEO */
#screen-video .course-name{font-size:1.45rem;font-weight:700;color:var(--ink);margin-bottom:1.5rem}
.watch-actions{display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap;margin-top:1rem}
.save-banner{border-radius:var(--radius-lg);padding:.75rem 1rem;text-align:center;font-size:.83rem;margin-top:1rem;display:none}
.save-banner.ok{background:var(--green-light);color:var(--green);display:block}
.save-banner.err{background:var(--danger-light);color:var(--danger);display:block}
</style>
</head>

<div id="screen-login" class="screen">
  <div class="login-card">
    <h2>員工訓練登入</h2>
    <p>請輸入工號查詢您的訓練進度</p>

      <input type="text" id="login-empid" placeholder="請輸入員工工號" onkeydown="if(event.key==='Enter')lookupEmployee()">
      <button class="btn btn-primary" onclick="lookupEmployee()" id="btn-lookup">查詢</button>
    </div>

    <div id="login-progress-area" style="display:none">
      <div id="login-status-badge" class="progress-badge none" style="margin-top:1rem">
        <span class="pb-icon">⏳</span>
        <span class="pb-text"><span class="pb-label">查詢中…</span></span>
      </div>

      <div id="login-manual-fields" class="manual-fields" style="display:none">
        <p class="mf-hint">請填寫以下資料：</p>
        <div class="form-group"><label>姓名 *</label><input type="text" id="login-name" placeholder="請輸入姓名"></div>
        <div class="form-group"><label>部門 *</label><input type="text" id="login-dept" placeholder="請輸入部門名稱"></div>
      </div>

      <div id="login-user-info" style="display:none;background:var(--paper2);border-radius:var(--radius-lg);padding:.75rem 1rem;margin-bottom:.9rem;font-size:.85rem;color:var(--ink2)">
        <strong id="login-show-name" style="color:var(--ink)"></strong>
        &nbsp;|&nbsp;<span id="login-show-dept"></span>
      </div>

      <button class="btn btn-primary" id="btn-proceed" style="width:100%;padding:.72rem;font-size:.92rem" onclick="proceedAfterLogin()">繼續 →</button>
    </div>
  </div>
</div>

<div id="screen-video" class="screen" style="align-items:center;justify-content:center;flex-direction:column;background:var(--paper);padding:2rem;text-align:center">
  <div style="max-width:860px;width:100%">
    <p style="font-size:.8rem;font-weight:700;color:var(--danger);background:var(--danger-light);display:inline-block;padding:.25rem .85rem;border-radius:12px;margin-bottom:1rem;letter-spacing:.05em">教育訓練影片</p>
    <h2 class="course-name" id="video-course-title">教育訓練</h2>
    <!-- YouTube 播放器容器 -->
    <div style="border-radius:8px;overflow:hidden;border:1px solid var(--paper3);background:#000;aspect-ratio:16/9;width:100%;position:relative">
      <div id="video-no-setting" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:.75rem;color:#aaa;font-size:.9rem">
        <span style="font-size:2.5rem">🎬</span>
        <span>影片尚未設定，請通知管理員至後台設定影片連結</span>
      </div>
      <!-- YouTube IFrame API 播放器容器 -->
      <div id="yt-player-wrap" style="position:absolute;inset:0;width:100%;height:100%">
        <div id="yt-player" style="width:100%;height:100%"></div>
      </div>
      <!-- 點擊遮罩：啟動播放 -->
      <div id="video-play-overlay" onclick="overlayStartVideo()" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,.5);transition:opacity .3s;z-index:10">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;margin-bottom:.9rem;box-shadow:0 4px 20px rgba(0,0,0,.4)">
          <span style="font-size:2rem;margin-left:4px">▶</span>
        </div>
        <span style="color:#fff;font-size:.9rem;font-weight:500;text-shadow:0 1px 4px rgba(0,0,0,.6)">點此開始播放</span>
      </div>
    </div>
    <p id="video-hint" style="margin-top:1rem;font-size:.85rem;color:var(--ink3)">▶ 請開始觀看影片，隨時可點擊「儲存觀看紀錄」保留進度</p>
    <div class="watch-actions">
      <button id="btn-save-progress" class="btn btn-secondary" onclick="saveWatchProgress()">💾 儲存觀看紀錄</button>
      <button class="btn btn-secondary" onclick="goLogin()">🔁 查詢其他工號</button>
    </div>
    <div id="save-banner" class="save-banner"></div>
  </div>
</div>

<script>
// ═══════════════ GOOGLE SHEETS ═══════════════
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyTFLnHGVNDY5U6cCjAs6nNk0sPP0liFEc7B68WhcyR0eUFSD_Id_JzKJACcBf8rP2yvw/exec';

// ═══════════════ 員工查詢（指定人員 / 影片紀錄）═══════════════
async function lookupEmployeeFromAPI(empId) {
  try {
    const r = await fetch(GOOGLE_SCRIPT_URL + '?action=lookupEmployee&empId=' + encodeURIComponent(empId));
    return await r.json(); // { found, source, name, dept } or { found: false }
  } catch(e) { return { found: false }; }
}

// ═══════════════ 影片設定（YouTube iframe）═══════════════
let YOUTUBE_VIDEO_ID = '';
let COURSE_NAME = '';

async function fetchVideoSettings(){
  try {
    const d = JSON.parse(await (await fetch(GOOGLE_SCRIPT_URL + '?action=getVideoSettings')).text());
    if(d.fileId) YOUTUBE_VIDEO_ID = d.fileId;
    COURSE_NAME = d.courseName || '教育訓練';
    document.getElementById('cover-course-title').textContent = COURSE_NAME;
    document.getElementById('video-course-title').textContent = COURSE_NAME;
    document.title = COURSE_NAME;
  } catch(e){ console.error('[VideoSettings]', e); }
}

let ytPlayer  = null;
let ytMaxTime = 0;
let ytWatcher = null;

function startSeekWatcher(){
  clearInterval(ytWatcher);
  ytWatcher = setInterval(function(){
    if(!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
    var state = ytPlayer.getPlayerState();
    if(state !== 1 && state !== 2) return; // 只在播放(1)或暫停(2)時檢查
    var cur = ytPlayer.getCurrentTime();
    if(cur > ytMaxTime + 3){
      // 跳段超前：拉回合法位置
      ytPlayer.seekTo(ytMaxTime, true);
    } else if(state === 1 && cur > ytMaxTime){
      // 正常播放：更新最遠位置
      ytMaxTime = cur;
    }
  }, 500);
}

let userData = {};
let progressStatus = 'none'; // none | in_progress | done
let savedWatchedSeconds = 0;

// ═══════════════ NAVIGATION ═══════════════
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function goLogin(){ show('login'); }

async function goVideo(){
  if(!YOUTUBE_VIDEO_ID) await fetchVideoSettings();

  document.getElementById('save-banner').className = 'save-banner';
  document.getElementById('save-banner').textContent = '';

  var overlay = document.getElementById('video-play-overlay');
  if(overlay){ overlay.style.display='flex'; overlay.style.opacity='1'; }
  document.getElementById('video-hint').textContent='▶ 請開始觀看影片，隨時可點擊「儲存觀看紀錄」保留進度';
  document.getElementById('video-hint').style.color='var(--ink3)';

  if(!YOUTUBE_VIDEO_ID){
    document.getElementById('video-no-setting').style.display='flex';
    show('video'); return;
  }
  document.getElementById('video-no-setting').style.display='none';

  // 清除舊播放器與計時器
  clearInterval(ytWatcher);
  if(ytPlayer){ try{ ytPlayer.destroy(); }catch(e){} ytPlayer = null; }
  ytMaxTime = savedWatchedSeconds || 0;

  // destroy() 會移除原 div，每次重新建立
  document.getElementById('yt-player-wrap').innerHTML =
    '<div id="yt-player" style="width:100%;height:100%"></div>';

  show('video');

  var waitReady = function(cb){
    if(window._ytReadyFlag && typeof YT !== 'undefined' && YT.Player) cb();
    else setTimeout(function(){ waitReady(cb); }, 200);
  };
  waitReady(function(){
    ytPlayer = new YT.Player('yt-player', {
      videoId: YOUTUBE_VIDEO_ID,
      playerVars: { rel:0, modestbranding:1, controls:1 },
      events: {
        onReady: function(){
          if(ytMaxTime > 0) ytPlayer.seekTo(ytMaxTime, true);
          startSeekWatcher();
        },
        onStateChange: function(e){
          if(e.data === YT.PlayerState.ENDED){
            clearInterval(ytWatcher);
            onVideoEnded();
          }
        }
      }
    });
  });
}

function overlayStartVideo(){
  var overlay = document.getElementById('video-play-overlay');
  overlay.style.opacity='0';
  setTimeout(function(){ overlay.style.display='none'; }, 300);
  if(ytPlayer && typeof ytPlayer.playVideo === 'function') ytPlayer.playVideo();
}

function onVideoEnded(){
  document.getElementById('video-hint').textContent='✓ 影片已觀看完畢';
  document.getElementById('video-hint').style.color='var(--green)';
  var seconds = ytPlayer && typeof ytPlayer.getDuration === 'function' ? ytPlayer.getDuration() : ytMaxTime;
  recordVideo('完成', seconds);
}

function saveWatchProgress(){
  if(!userData.empId){ alert('請先完成員工登入'); return; }
  var seconds = ytPlayer && typeof ytPlayer.getCurrentTime === 'function' ? ytPlayer.getCurrentTime() : ytMaxTime;
  recordVideo('進行中', seconds);
}

function recordVideo(status, seconds){
  const banner = document.getElementById('save-banner');
  banner.className = 'save-banner';
  banner.textContent = '⏳ 儲存中…';
  const data = {
    action:'recordVideo', timestamp:new Date().toLocaleString('zh-TW'),
    name:userData.name, dept:userData.dept, empId:userData.empId,
    videoStatus: status, watchedSeconds: Math.round(seconds || 0)
  };
  fetch(GOOGLE_SCRIPT_URL, { method:'POST', body:JSON.stringify(data) })
    .then(()=>{
      banner.className = 'save-banner ok';
      banner.textContent = status === '完成' ? '✅ 已完成觀看，紀錄已儲存' : '✅ 觀看紀錄已儲存，下次登入可從此進度繼續觀看';
      savedWatchedSeconds = Math.round(seconds || 0);
    })
    .catch(()=>{
      banner.className = 'save-banner err';
      banner.textContent = '⚠️ 儲存失敗，請確認網路連線後再試一次';
    });
}

// ═══════════════ 員工登入 ═══════════════
async function lookupEmployee(){
  const empId = document.getElementById('login-empid').value.trim().toUpperCase();
  if(!empId){ alert('請輸入員工工號'); return; }

  const btn = document.getElementById('btn-lookup');
  btn.disabled = true; btn.textContent = '查詢中…';

  // 依序查：指定人員 → 影片紀錄
  const result = await lookupEmployeeFromAPI(empId);
  const manualArea = document.getElementById('login-manual-fields');
  const userInfo = document.getElementById('login-user-info');

  if(result.found){
    userData = { empId, name: result.name, dept: result.dept, autoFilled: true };
    document.getElementById('login-show-name').textContent = result.name;
    document.getElementById('login-show-dept').textContent = result.dept;
    userInfo.style.display = 'block';
    manualArea.style.display = 'none';
  } else {
    userData = { empId, name:'', dept:'', autoFilled: false };
    manualArea.style.display = 'block';
    userInfo.style.display = 'none';
  }

  // 查詢觀看進度
  const progress = await fetchProgress(empId);
  progressStatus = progress.status;
  savedWatchedSeconds = progress.watchedSeconds || 0;
  showLoginProgress(progressStatus);

  document.getElementById('login-progress-area').style.display = 'block';
  btn.disabled = false; btn.textContent = '查詢';
}

async function fetchProgress(empId){
  try{
    const url = GOOGLE_SCRIPT_URL + '?action=getProgress&empId=' + encodeURIComponent(empId);
    const res = await fetch(url, { redirect:'follow' });
    return await res.json();
  } catch(e){
    return { status: 'none', watchedSeconds: 0 };
  }
}

function formatMinSec(seconds){
  const s = Math.round(seconds || 0);
  const m = Math.floor(s/60), r = s%60;
  return `${m}分${r}秒`;
}

function showLoginProgress(status){
  const badge = document.getElementById('login-status-badge');
  const configs = {
    none:        { cls:'none',        icon:'📋', label:'尚未開始觀看',   desc:'請點擊下方按鈕開始觀看課程影片' },
    in_progress: { cls:'in_progress', icon:'🎬', label:'觀看中',         desc:`已觀看至 ${formatMinSec(savedWatchedSeconds)}，可繼續接續觀看` },
    done:        { cls:'done',        icon:'✅', label:'已完成觀看',     desc:'您已完成本課程影片觀看，亦可重新觀看複習' },
  };
  const cfg = configs[status] || configs.none;
  badge.className = 'progress-badge ' + cfg.cls;
  badge.innerHTML = `<span class="pb-icon">${cfg.icon}</span><span class="pb-text"><span class="pb-label">${cfg.label}</span>${cfg.desc}</span>`;

  const proceedBtn = document.getElementById('btn-proceed');
  if(status === 'done')             proceedBtn.textContent = '重新觀看 →';
  else if(status === 'in_progress') proceedBtn.textContent = '繼續觀看 →';
  else                               proceedBtn.textContent = '開始觀看 →';
}

function proceedAfterLogin(){
  // 若查無資料，先驗證手動填寫欄位
  if(!userData.autoFilled){
    const name = document.getElementById('login-name').value.trim();
    const dept = document.getElementById('login-dept').value.trim();
    if(!name || !dept){ alert('請填寫姓名與部門'); return; }
    userData.name = name; userData.dept = dept;
  }
  goVideo();
}
