<html lang="zh-TW">

<title>教育訓練影片學習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1814;--ink2:#3d3a34;--ink3:#7a7570;
  --paper:#faf9f6;--paper2:#f2f0eb;--paper3:#e8e5de;
  --accent:#F47920;--accent2:#D45F0A;--accent-light:#FEF5EC;
  --green:#1a7a3a;--green-light:#e8f5ed;
  --orange:#F47920;--orange-light:#FEF5EC;
  --danger:#F47920;--danger-light:#FEF5EC;
  --red:#8b2020;--red-light:#fde8e8;
  --purple:#5a3a9a;--purple-light:#f0ebfa;
  --navy:#1a3a6a;
  --radius:4px;--radius-lg:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* COVER */
#screen-cover{background:var(--paper);align-items:center;justify-content:center;text-align:center;padding:2rem}
#screen-cover .logo-wrap{margin-bottom:2rem;padding-bottom:1.75rem;border-bottom:1px solid var(--paper3)}
#screen-cover .logo-wrap img{height:auto;max-height:88px;max-width:265px;width:auto}
#screen-cover .new-law-badge{background:var(--accent-light);color:var(--accent2);border:1px solid rgba(244,121,32,.3);border-radius:20px;padding:.35rem 1.2rem;font-size:.82rem;font-weight:700;letter-spacing:.08em;display:inline-block;margin-bottom:1.25rem}
#screen-cover h1{font-size:2rem;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:.6rem}
#screen-cover h2{font-size:.95rem;font-weight:400;color:var(--ink2);margin-bottom:2.25rem;line-height:1.6}
#screen-cover .meta{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.75rem}
#screen-cover .meta span{background:var(--paper2);color:var(--ink2);border-radius:20px;padding:.35rem 1rem;font-size:.82rem;border:1px solid var(--paper3)}
#screen-cover .btn-start{background:var(--accent);color:#fff;font-size:.95rem;font-weight:700;padding:.9rem 2.75rem;border-radius:30px;border:none;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s}
#screen-cover .btn-start:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(244,121,32,.35)}

/* BUTTONS */
.btn{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-size:.88rem;font-weight:500;padding:.55rem 1.4rem;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:transparent;color:var(--ink2);border:1px solid var(--paper3)}
.btn-secondary:hover{background:var(--paper)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#14602e}
.btn:disabled{opacity:.4;cursor:not-allowed}

.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.8rem;font-weight:700;color:var(--ink2);margin-bottom:.35rem}
.form-group input,.form-group select{width:100%;padding:.62rem .9rem;border:1px solid var(--paper3);border-radius:var(--radius);font-family:inherit;font-size:.88rem;color:var(--ink);background:var(--paper);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(244,121,32,.15)}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;background:var(--paper)}
.login-card{background:#fff;border-radius:12px;border:1px solid var(--paper3);padding:2.25rem;width:100%;max-width:460px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.login-card h2{font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:.35rem}
.login-card>p{font-size:.85rem;color:var(--ink3);margin-bottom:1.75rem}
.login-id-row{display:flex;gap:.6rem}
.login-id-row input{flex:1}
.login-id-row button{white-space:nowrap}
#login-progress-area{margin-top:1.25rem}
.progress-badge{border-radius:var(--radius-lg);padding:.85rem 1.1rem;font-size:.85rem;font-weight:500;display:flex;align-items:flex-start;gap:.65rem;margin-bottom:1rem}
.progress-badge .pb-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.progress-badge .pb-text{line-height:1.6}
.progress-badge .pb-label{font-weight:700;display:block;font-size:.8rem;letter-spacing:.04em;margin-bottom:.2rem}
.progress-badge.none{background:#f5f5f4;border:1px solid #e0ddd6;color:var(--ink2)}
.progress-badge.in_progress{background:#fff8e6;border:1px solid #f0d870;color:#7a5f00}
.progress-badge.done{background:var(--green-light);border:1px solid #b7eb8f;color:#135200}
.progress-badge.fail{background:var(--red-light);border:1px solid rgba(139,32,32,.25);color:var(--red)}
.manual-fields{border-top:1px solid var(--paper3);padding-top:1rem;margin-top:.25rem}
.manual-fields .mf-hint{font-size:.78rem;color:var(--ink3);margin-bottom:.85rem}

/* VIDEO */
#screen-video .course-name{font-size:1.45rem;font-weight:700;color:var(--ink);margin-bottom:1.5rem}
.watch-actions{display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap;margin-top:1rem}
.save-banner{border-radius:var(--radius-lg);padding:.75rem 1rem;text-align:center;font-size:.83rem;margin-top:1rem;display:none}
.save-banner.ok{background:var(--green-light);color:var(--green);display:block}
.save-banner.err{background:var(--danger-light);color:var(--danger);display:block}

/* QUIZ */
#screen-quiz{background:var(--paper);padding:2rem}
.quiz-progress-bar{height:6px;background:var(--paper3);border-radius:3px;overflow:hidden;margin-bottom:1.25rem;max-width:640px;width:100%;margin-left:auto;margin-right:auto}
.quiz-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.quiz-card{background:#fff;border:1px solid var(--paper3);border-radius:var(--radius-lg);padding:1.75rem;text-align:left;max-width:640px;width:100%;margin:0 auto}
.q-count-badge{font-size:.78rem;font-weight:700;color:var(--accent);background:var(--accent-light);padding:.22rem .7rem;border-radius:12px;display:inline-block;margin-bottom:.9rem}
.q-text{font-size:1.05rem;font-weight:500;color:var(--ink);line-height:1.65;margin-bottom:1.25rem}
.q-options{display:flex;flex-direction:column;gap:.65rem}
.q-option{display:flex;align-items:flex-start;gap:.7rem;padding:.85rem 1.05rem;background:var(--paper);border:1.5px solid var(--paper3);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s;font-size:.9rem;color:var(--ink2)}
.q-option:hover{border-color:var(--accent);background:var(--accent-light)}
.q-option.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:500}
.q-option-label{width:24px;height:24px;border-radius:50%;background:var(--paper3);font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-option.selected .q-option-label{background:var(--accent);color:#fff}
.quiz-nav{display:flex;justify-content:space-between;margin-top:1.5rem;max-width:640px;margin-left:auto;margin-right:auto}

/* QUIZ RESULT */
#screen-quiz-result{background:var(--paper);padding:2rem}
.result-hero{border-radius:var(--radius-lg);padding:2rem;color:#fff;text-align:center;margin-bottom:1.5rem;max-width:640px;margin-left:auto;margin-right:auto}
.result-hero.pass{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%)}
.result-hero.fail{background:linear-gradient(135deg,var(--red) 0%,#5a1010 100%)}
.result-score{font-size:3rem;font-weight:700}
.result-verdict{font-size:1.05rem;margin-top:.35rem}
.wrong-list{max-width:640px;margin:0 auto 1rem;text-align:left}
.wrong-item{background:#fff;border:1px solid var(--paper3);border-radius:var(--radius-lg);padding:1rem 1.15rem;margin-bottom:.65rem}
.wrong-item .wi-q{font-size:.88rem;font-weight:500;color:var(--ink);margin-bottom:.4rem;line-height:1.55}
.wrong-item .wi-your{font-size:.8rem;color:var(--red);margin-bottom:.2rem}
.wrong-item .wi-correct{font-size:.8rem;color:var(--green);font-weight:500}
.quiz-result-actions{display:flex;gap:.75rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;max-width:640px;margin-left:auto;margin-right:auto}
</style>
</head>

<script>
// ═══════════════ GOOGLE SHEETS ═══════════════
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyTFLnHGVNDY5U6cCjAs6nNk0sPP0liFEc7B68WhcyR0eUFSD_Id_JzKJACcBf8rP2yvw/exec';

// ═══════════════ 員工查詢（指定人員 / 影片紀錄）═══════════════
async function lookupEmployeeFromAPI(empId) {
  try {
    const r = await fetch(GOOGLE_SCRIPT_URL + '?action=lookupEmployee&empId=' + encodeURIComponent(empId));
    return await r.json(); // { found, source, name, dept } or { found: false }
  } catch(e) { return { found: false }; }
}

// ═══════════════ 影片設定（YouTube iframe）═══════════════
let YOUTUBE_VIDEO_ID = '';
let COURSE_NAME = '';

async function fetchVideoSettings(){
  try {
    const d = JSON.parse(await (await fetch(GOOGLE_SCRIPT_URL + '?action=getVideoSettings')).text());
    if(d.fileId) YOUTUBE_VIDEO_ID = d.fileId;
    COURSE_NAME = d.courseName || '教育訓練';
    document.getElementById('cover-course-title').textContent = COURSE_NAME;
    document.getElementById('video-course-title').textContent = COURSE_NAME;
    document.title = COURSE_NAME;
  } catch(e){ console.error('[VideoSettings]', e); }
}

let ytPlayer  = null;
let ytMaxTime = 0;
let ytWatcher = null;

function startSeekWatcher(){
  clearInterval(ytWatcher);
  ytWatcher = setInterval(function(){
    if(!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
    var state = ytPlayer.getPlayerState();
    if(state !== 1 && state !== 2) return; // 只在播放(1)或暫停(2)時檢查
    var cur = ytPlayer.getCurrentTime();
    if(cur > ytMaxTime + 3){
      // 跳段超前：拉回合法位置
      ytPlayer.seekTo(ytMaxTime, true);
    } else if(state === 1 && cur > ytMaxTime){
      // 正常播放：更新最遠位置
      ytMaxTime = cur;
    }
  }, 500);
}

let userData = {};
let progressStatus = 'none'; // none | in_progress | video_done | quiz_failed | quiz_passed
let savedWatchedSeconds = 0;
let lastProgress = null;

// ═══════════════ NAVIGATION ═══════════════
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function goLogin(){ show('login'); }

async function goVideo(){
  if(!YOUTUBE_VIDEO_ID) await fetchVideoSettings();

  document.getElementById('save-banner').className = 'save-banner';
  document.getElementById('save-banner').textContent = '';

  var overlay = document.getElementById('video-play-overlay');
  if(overlay){ overlay.style.display='flex'; overlay.style.opacity='1'; }
  document.getElementById('video-hint').textContent='▶ 請開始觀看影片，隨時可點擊暫停並點擊「儲存學習進度」保留進度';
  document.getElementById('video-hint').style.color='var(--ink3)';
  document.getElementById('video-hint').style.fontSize='.85rem';
  document.getElementById('video-hint').style.fontWeight='400';
  document.getElementById('video-no-quiz-hint').style.display = 'none';
  document.getElementById('btn-save-progress').style.display = '';
  document.getElementById('btn-goto-quiz').style.display = 'none';

  if(!YOUTUBE_VIDEO_ID){
    document.getElementById('video-no-setting').style.display='flex';
    show('video'); return;
  }
  document.getElementById('video-no-setting').style.display='none';

  // 清除舊播放器與計時器
  clearInterval(ytWatcher);
  if(ytPlayer){ try{ ytPlayer.destroy(); }catch(e){} ytPlayer = null; }
  // 僅在「觀看中」時從上次進度繼續；已完成者重新觀看一律從頭開始，
  // 避免直接跳到片尾造成黑畫面
  ytMaxTime = (progressStatus === 'in_progress') ? (savedWatchedSeconds || 0) : 0;

  // destroy() 會移除原 div，每次重新建立
  document.getElementById('yt-player-wrap').innerHTML =
    '<div id="yt-player" style="width:100%;height:100%"></div>';

  show('video');

  var waitReady = function(cb){
    if(window._ytReadyFlag && typeof YT !== 'undefined' && YT.Player) cb();
    else setTimeout(function(){ waitReady(cb); }, 200);
  };
  waitReady(function(){
    ytPlayer = new YT.Player('yt-player', {
      videoId: YOUTUBE_VIDEO_ID,
      playerVars: { rel:0, modestbranding:1, controls:1 },
      events: {
        onReady: function(){
          // 避免存檔秒數等於或超過實際片長，導致跳到片尾出現黑畫面
          var duration = ytPlayer.getDuration() || 0;
          if(duration > 0 && ytMaxTime >= duration) ytMaxTime = Math.max(duration - 3, 0);
          if(ytMaxTime > 0) ytPlayer.seekTo(ytMaxTime, true);
          startSeekWatcher();
        },
        onStateChange: function(e){
          if(e.data === YT.PlayerState.ENDED){
            clearInterval(ytWatcher);
            onVideoEnded();
          }
        }
      }
    });
  });
}

function overlayStartVideo(){
  var overlay = document.getElementById('video-play-overlay');
  overlay.style.opacity='0';
  setTimeout(function(){ overlay.style.display='none'; }, 300);
  if(ytPlayer && typeof ytPlayer.playVideo === 'function') ytPlayer.playVideo();
}

function onVideoEnded(){
  document.getElementById('video-hint').textContent='恭喜~您已完成本次學習';
  document.getElementById('video-hint').style.color='var(--green)';
  document.getElementById('video-hint').style.fontSize='1.7rem';
  document.getElementById('video-hint').style.fontWeight='700';
  document.getElementById('btn-save-progress').style.display = 'none';
  document.getElementById('btn-goto-quiz').style.display = QUIZ_QUESTIONS.length > 0 ? 'inline-block' : 'none';
  document.getElementById('video-no-quiz-hint').style.display = QUIZ_QUESTIONS.length === 0 ? 'block' : 'none';
  var seconds = ytPlayer && typeof ytPlayer.getDuration === 'function' ? ytPlayer.getDuration() : ytMaxTime;
  recordVideo('完成', seconds);
}

function saveWatchProgress(){
  if(!userData.empId){ alert('請先完成員工登入'); return; }
  var seconds = ytPlayer && typeof ytPlayer.getCurrentTime === 'function' ? ytPlayer.getCurrentTime() : ytMaxTime;
  recordVideo('進行中', seconds);
}

function recordVideo(status, seconds){
  const banner = document.getElementById('save-banner');
  banner.className = 'save-banner';
  banner.textContent = '⏳ 儲存中…';
  const data = {
    action:'recordVideo', timestamp:new Date().toLocaleString('zh-TW'),
    name:userData.name, dept:userData.dept, empId:userData.empId,
    videoStatus: status, watchedSeconds: Math.round(seconds || 0)
  };
  fetch(GOOGLE_SCRIPT_URL, { method:'POST', body:JSON.stringify(data) })
    .then(()=>{
      banner.className = 'save-banner ok';
      banner.textContent = status === '完成' ? '✅ 已完成觀看，紀錄已儲存' : '✅ 觀看紀錄已儲存，下次登入可從此進度繼續觀看';
      savedWatchedSeconds = Math.round(seconds || 0);
    })
    .catch(()=>{
      banner.className = 'save-banner err';
      banner.textContent = '⚠️ 儲存失敗，請確認網路連線後再試一次';
    });
}

// ═══════════════ 員工登入 ═══════════════
async function lookupEmployee(){
  const empId = document.getElementById('login-empid').value.trim().toUpperCase();
  if(!empId){ alert('請輸入員工工號'); return; }

  const btn = document.getElementById('btn-lookup');
  btn.disabled = true; btn.textContent = '查詢中…';

  // 依序查：指定人員 → 影片紀錄
  const result = await lookupEmployeeFromAPI(empId);
  const manualArea = document.getElementById('login-manual-fields');
  const userInfo = document.getElementById('login-user-info');

  if(result.found){
    userData = { empId, name: result.name, dept: result.dept, autoFilled: true };
    document.getElementById('login-show-name').textContent = result.name;
    document.getElementById('login-show-dept').textContent = result.dept;
    userInfo.style.display = 'block';
    manualArea.style.display = 'none';
  } else {
    userData = { empId, name:'', dept:'', autoFilled: false };
    manualArea.style.display = 'block';
    userInfo.style.display = 'none';
  }

  // 查詢觀看進度、測驗題庫設定
  const [progress] = await Promise.all([ fetchProgress(empId), fetchQuizSettings() ]);
  lastProgress = progress;
  progressStatus = progress.status;
  savedWatchedSeconds = progress.watchedSeconds || 0;
  showLoginProgress(progress);

  document.getElementById('login-progress-area').style.display = 'block';
  btn.disabled = false; btn.textContent = '查詢';
}

async function fetchProgress(empId){
  try{
    const url = GOOGLE_SCRIPT_URL + '?action=getProgress&empId=' + encodeURIComponent(empId);
    const res = await fetch(url, { redirect:'follow' });
    return await res.json();
  } catch(e){
    return { status: 'none', watchedSeconds: 0 };
  }
}

function formatMinSec(seconds){
  const s = Math.round(seconds || 0);
  const m = Math.floor(s/60), r = s%60;
  return `${m}分${r}秒`;
}

function showLoginProgress(progress){
  const status = progress.status;
  const badge = document.getElementById('login-status-badge');
  const noQuizDone = status === 'video_done' && QUIZ_QUESTIONS.length === 0;
  const configs = {
    none:         { cls:'none',        icon:'📋', label:'尚未開始觀看',       desc:'請點擊下方按鈕開始觀看課程影片' },
    in_progress:  { cls:'in_progress',  icon:'🎬', label:'觀看中',            desc:`已觀看至 ${formatMinSec(savedWatchedSeconds)}，可繼續接續觀看` },
    video_done:   noQuizDone
      ? { cls:'done',        icon:'✅', label:'已完成學習',        desc:'本課程無需進行測驗，您已完成本課程學習' }
      : { cls:'in_progress',  icon:'📝', label:'影片已看完，尚未測驗', desc:'請進行測驗，測驗及格分數為 80 分' },
    quiz_failed:  { cls:'fail',         icon:'❌', label:'測驗未通過',        desc:`上次得分 ${progress.quizScore}/${progress.quizTotal}（${progress.quizPct}%），可重新測驗` },
    quiz_passed:  { cls:'done',         icon:'✅', label:'已完成測驗',        desc:`得分 ${progress.quizScore}/${progress.quizTotal}（${progress.quizPct}%），您已完成本課程訓練` },
  };
  const cfg = configs[status] || configs.none;
  badge.className = 'progress-badge ' + cfg.cls;
  badge.innerHTML = `<span class="pb-icon">${cfg.icon}</span><span class="pb-text"><span class="pb-label">${cfg.label}</span>${cfg.desc}</span>`;

  const proceedBtn = document.getElementById('btn-proceed');
  if(status === 'quiz_passed')      proceedBtn.textContent = '查看結果 →';
  else if(status === 'quiz_failed') proceedBtn.textContent = '重新測驗 →';
  else if(noQuizDone)                proceedBtn.textContent = '查看完成 →';
  else if(status === 'video_done')  proceedBtn.textContent = '前往測驗 →';
  else if(status === 'in_progress') proceedBtn.textContent = '繼續觀看 →';
  else                               proceedBtn.textContent = '開始觀看 →';
}

function proceedAfterLogin(){
  // 若查無資料，先驗證手動填寫欄位
  if(!userData.autoFilled){
    const name = document.getElementById('login-name').value.trim();
    const dept = document.getElementById('login-dept').value.trim();
    if(!name || !dept){ alert('請填寫姓名與部門'); return; }
    userData.name = name; userData.dept = dept;
  }
  if(progressStatus === 'video_done'){
    if(QUIZ_QUESTIONS.length === 0) showNoQuizComplete();
    else goQuiz();
  } else if(progressStatus === 'quiz_failed' || progressStatus === 'quiz_passed'){
    showQuizResultFromProgress(lastProgress);
  } else {
    goVideo();
  }
}

// ═══════════════ 測驗 ═══════════════
const PASS_SCORE_PCT = 80;
let QUIZ_QUESTIONS = [];
let quizAnswers = {};
let quizCurrentQ = 0;

async function fetchQuizSettings(){
  try{
    const d = JSON.parse(await (await fetch(GOOGLE_SCRIPT_URL + '?action=getQuizSettings')).text());
    QUIZ_QUESTIONS = d.questions || [];
  }catch(e){ QUIZ_QUESTIONS = []; }
}

async function goQuiz(){
  if(!QUIZ_QUESTIONS.length) await fetchQuizSettings();
  if(!QUIZ_QUESTIONS.length){ alert('尚未設定測驗題目，請聯絡管理員'); return; }
  quizAnswers = {}; quizCurrentQ = 0;
  show('quiz');
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const total = QUIZ_QUESTIONS.length;
  const q = QUIZ_QUESTIONS[quizCurrentQ];
  const labels = ['A','B','C','D'];
  document.getElementById('quiz-progress-fill').style.width = `${((quizCurrentQ+1)/total)*100}%`;
  document.getElementById('q-count-badge').textContent = `第 ${quizCurrentQ+1} 題 ／ 共 ${total} 題`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('q-options').innerHTML = q.options.map((opt,i)=>{
    const cls = 'q-option' + (quizAnswers[quizCurrentQ]===labels[i] ? ' selected' : '');
    return `<div class="${cls}" onclick="selectQuizAnswer('${labels[i]}')"><div class="q-option-label">${labels[i]}</div><span>${opt}</span></div>`;
  }).join('');

  document.getElementById('btn-quiz-prev').disabled = quizCurrentQ===0;
  const isLast = quizCurrentQ === total-1;
  const nextBtn = document.getElementById('btn-quiz-next');
  nextBtn.textContent = isLast ? '提交測驗' : '下一題 →';
  nextBtn.onclick = isLast ? submitQuiz : quizNext;
}

function selectQuizAnswer(letter){
  quizAnswers[quizCurrentQ] = letter;
  renderQuizQuestion();
}

function quizNext(){
  if(quizAnswers[quizCurrentQ]===undefined){ alert('請先作答本題，再進入下一題'); return; }
  if(quizCurrentQ < QUIZ_QUESTIONS.length-1){ quizCurrentQ++; renderQuizQuestion(); }
}

function quizPrev(){ if(quizCurrentQ>0){ quizCurrentQ--; renderQuizQuestion(); } }

function submitQuiz(){
  if(quizAnswers[quizCurrentQ]===undefined){ alert('請先作答本題，再提交測驗'); return; }
  const labels = ['A','B','C','D'];
  let correct = 0; const wrong = [];
  QUIZ_QUESTIONS.forEach((q,i)=>{
    if(quizAnswers[i] === q.answer) correct++;
    else wrong.push({ q, yourAnswer: quizAnswers[i] });
  });
  const total = QUIZ_QUESTIONS.length;
  const pct  = Math.round((correct/total)*100);
  const pass = pct >= PASS_SCORE_PCT;
  const wrongCount = total - correct;

  document.getElementById('result-score').style.display = '';
  document.getElementById('result-score').textContent = `${pct} 分`;
  document.getElementById('result-hero').className = 'result-hero ' + (pass?'pass':'fail');
  document.getElementById('result-verdict').textContent = pass
    ? `✅ 答對題數 ${correct}，答錯題數 ${wrongCount}，正確率 ${pct}%，恭喜通過測驗！`
    : `❌ 答對題數 ${correct}，答錯題數 ${wrongCount}，正確率 ${pct}%，未達 80 分及格標準，請重新測驗`;
  document.getElementById('btn-retake').style.display = pass ? 'none' : 'inline-block';

  document.getElementById('wrong-list').innerHTML = wrong.length===0
    ? '<div style="text-align:center;color:var(--green);font-weight:500">🎉 全部答對！</div>'
    : '<h3 style="font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:.75rem">📋 答錯題目解析</h3>' + wrong.map(({q,yourAnswer})=>`
      <div class="wrong-item">
        <div class="wi-q">${q.question}</div>
        <div class="wi-your">您的答案：${yourAnswer ? yourAnswer + '、' + q.options[labels.indexOf(yourAnswer)] : '未作答'}</div>
        <div class="wi-correct">正確答案：${q.answer}、${q.options[labels.indexOf(q.answer)]}</div>
      </div>`).join('');

  show('quiz-result');
  saveQuizResult(correct, total, pct, pass);
}

function saveQuizResult(score, total, pct, pass){
  const banner = document.getElementById('quiz-save-banner');
  banner.className = 'save-banner';
  banner.textContent = '⏳ 儲存中…';
  const data = {
    action:'recordQuiz', timestamp:new Date().toLocaleString('zh-TW'),
    name:userData.name, dept:userData.dept, empId:userData.empId,
    score, total, pct
  };
  fetch(GOOGLE_SCRIPT_URL, { method:'POST', body:JSON.stringify(data) })
    .then(()=>{
      banner.className = 'save-banner ok';
      banner.textContent = '✅ 測驗紀錄已儲存';
    })
    .catch(()=>{
      banner.className = 'save-banner err';
      banner.textContent = '⚠️ 儲存失敗，請確認網路連線後再試一次';
    });
}

// 登入時若已有測驗紀錄，直接顯示上次測驗結果（不重新作答）
function showQuizResultFromProgress(progress){
  const wrongCount = (progress.quizTotal||0) - (progress.quizScore||0);
  document.getElementById('result-score').style.display = '';
  document.getElementById('result-score').textContent = `${progress.quizPct} 分`;
  document.getElementById('result-hero').className = 'result-hero ' + (progress.status==='quiz_passed' ? 'pass' : 'fail');
  document.getElementById('result-verdict').textContent = progress.status==='quiz_passed'
    ? `✅ 答對題數 ${progress.quizScore}，答錯題數 ${wrongCount}，正確率 ${progress.quizPct}%，您已通過測驗！`
    : `❌ 答對題數 ${progress.quizScore}，答錯題數 ${wrongCount}，正確率 ${progress.quizPct}%，未達 80 分及格標準，請重新測驗`;
  document.getElementById('btn-retake').style.display = progress.status==='quiz_failed' ? 'inline-block' : 'none';
  document.getElementById('wrong-list').innerHTML = '';
  document.getElementById('quiz-save-banner').className = 'save-banner';
  document.getElementById('quiz-save-banner').textContent = '';
  show('quiz-result');
}

// 題庫設定為 0 題時，影片觀看完畢後直接顯示已完成學習，不需進入測驗
function showNoQuizComplete(){
  document.getElementById('result-hero').className = 'result-hero pass';
  document.getElementById('result-score').style.display = 'none';
  document.getElementById('result-verdict').textContent = '🎉 恭喜您已完成本課程學習，本課程無需進行測驗';
  document.getElementById('btn-retake').style.display = 'none';
  document.getElementById('wrong-list').innerHTML = '';
  document.getElementById('quiz-save-banner').className = 'save-banner';
  document.getElementById('quiz-save-banner').textContent = '';
  show('quiz-result');
}

document.getElementById('video-logo').src = _coverLogoSrc;
document.getElementById('quiz-logo').src = _coverLogoSrc;
document.getElementById('quiz-result-logo').src = _coverLogoSrc;

fetchVideoSettings();
fetchQuizSettings();
</script>
